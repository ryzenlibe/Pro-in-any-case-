<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYZENLIBE</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  overflow-x: hidden;
}

.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
}

.video-box {
  width: 100%;
}

video {
  width: 100%;
  max-height: 75vh;
  object-fit: contain;
  display: block;
  background: #000;
}

video::-webkit-media-controls-fullscreen-button {
  display: none !important;
}

video::-webkit-media-controls-overflow-button {
  display: none !important;
}

.rec-title {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 15px 6px;
}

.native-wrap {
  padding: 10px;
  display: flex;
  justify-content: center;
}

.banner-300 {
  display: flex;
  justify-content: center;
  padding: 15px 0 30px;
}
</style>
</head>

<body>

<div class="page">

<!-- VIDEO -->
<div class="video-box">
<video 
id="player"
controls
autoplay
muted
playsinline
preload="metadata"
poster="https://via.placeholder.com/480x720?text=Loading..."
controlsList="nodownload noremoteplayback"
disablePictureInPicture
>
<source id="videoSource" src="" type="video/mp4">
</video>
</div>

<div class="rec-title">
🔥 Trending Videos
</div>

<!-- ✅ NATIVE TERBARU -->
<div class="native-wrap">
<script async="async" data-cfasync="false" src="https://possessedannihilation.com/7a8bff3f96ec1ebb1ef2b463951bec51/invoke.js"></script>
<div id="container-7a8bff3f96ec1ebb1ef2b463951bec51"></div>
</div>

<!-- ✅ BANNER TERBARU -->
<div class="banner-300">
<script>
  atOptions = {
    'key' : '2dc93f1568b437e9ad198a493f8f2ed1',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://possessedannihilation.com/2dc93f1568b437e9ad198a493f8f2ed1/invoke.js"></script>
</div>

</div>

<script>
(function () {

const params = new URLSearchParams(window.location.search);
let video = params.get("v");

if (video) {
  if (!video.startsWith("http")) {
    video = "https://cdn.videy.co/" + video;
  }
} else {
  video = "https://cdn.videy.co/Jewsu9D81.mp4";
}

const player = document.getElementById("player");
const source = document.getElementById("videoSource");

source.src = video;
player.load();

// anti klik kanan
player.addEventListener("contextmenu", e => e.preventDefault());

})();
</script>

</body>
</html>
